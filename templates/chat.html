<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-0: #0b1214;
            --bg-1: #111f1f;
            --bg-2: #0c1718;
            --ink: #e7f0ee;
            --muted: #9fb4b0;
            --accent: #d6a24a;
            --accent-2: #1fb7a6;
            --card: rgba(16, 28, 28, 0.78);
            --line: rgba(214, 162, 74, 0.25);
            --shadow: rgba(0, 0, 0, 0.35);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Manrope', sans-serif;
            background: linear-gradient(135deg, var(--bg-0) 0%, var(--bg-1) 55%, var(--bg-2) 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--ink);
        }

        body::before {
            content: '';
            position: fixed;
            top: -40%;
            right: -30%;
            width: 70%;
            height: 70%;
            background: radial-gradient(circle, rgba(214, 162, 74, 0.18) 0%, transparent 70%);
            pointer-events: none;
            animation: drift 20s ease-in-out infinite;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -35%;
            left: -25%;
            width: 70%;
            height: 70%;
            background: radial-gradient(circle, rgba(31, 183, 166, 0.16) 0%, transparent 70%);
            pointer-events: none;
            animation: drift-reverse 18s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        @keyframes drift-reverse {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-30px, 30px); }
        }
        
        nav {
            background: rgba(11, 18, 20, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--line);
            padding: 0 40px;
            z-index: 1000;
        }

        .navbar-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 72px;
        }

        .navbar-brand {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(110deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .navbar-links {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .navbar-links a {
            color: var(--muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .navbar-links a:hover {
            color: var(--accent-2);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .counter {
            background: rgba(31, 183, 166, 0.2);
            color: var(--ink);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid rgba(31, 183, 166, 0.4);
        }

        .counter.warning {
            border-color: rgba(214, 162, 74, 0.6);
            background: rgba(214, 162, 74, 0.15);
        }

        .counter.danger {
            border-color: rgba(220, 79, 79, 0.7);
            background: rgba(220, 79, 79, 0.2);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .profile-img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            object-fit: cover;
        }

        .profile-name {
            font-weight: 600;
            color: var(--ink);
            font-size: 13px;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .signout-btn {
            background: linear-gradient(110deg, var(--accent), #f0c46e);
            color: #1a1410;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            font-family: 'Manrope', sans-serif;
        }

        .signout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(214, 162, 74, 0.25);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 22px;
            max-width: 940px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        .message {
            margin: 12px 0;
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user { flex-direction: row-reverse; }
        
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
            letter-spacing: 0.5px;
        }
        
        .user .avatar { background: linear-gradient(110deg, var(--accent), #f0c46e); color: #1a1410; }
        .assistant .avatar { background: rgba(31, 183, 166, 0.2); color: var(--ink); border: 1px solid rgba(31, 183, 166, 0.4); }
        
        .bubble {
            max-width: 70%;
            padding: 14px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .user .bubble {
            background: linear-gradient(110deg, var(--accent), #f0c46e);
            color: #1a1410;
            border-top-right-radius: 6px;
        }
        
        .assistant .bubble {
            background: var(--card);
            color: var(--ink);
            border: 1px solid var(--line);
            border-top-left-radius: 6px;
        }
        
        .input-area {
            background: rgba(11, 18, 20, 0.85);
            padding: 16px 20px;
            border-top: 1px solid var(--line);
            backdrop-filter: blur(12px);
        }
        
        .input-row {
            display: flex;
            gap: 12px;
            max-width: 940px;
            margin: 0 auto;
        }
        
        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid rgba(31, 183, 166, 0.35);
            background: rgba(16, 28, 28, 0.7);
            border-radius: 24px;
            font-size: 14px;
            color: var(--ink);
            outline: none;
            transition: all 0.2s;
            font-family: 'Manrope', sans-serif;
        }
        
        #messageInput:focus {
            border-color: var(--accent-2);
            background: rgba(16, 28, 28, 0.9);
            box-shadow: 0 0 12px rgba(31, 183, 166, 0.2);
        }
        
        #sendBtn {
            background: linear-gradient(110deg, var(--accent), #f0c46e);
            color: #1a1410;
            border: none;
            padding: 12px 24px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            font-family: 'Manrope', sans-serif;
        }
        
        #sendBtn:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(214, 162, 74, 0.25); }
        #sendBtn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .typing {
            color: var(--muted);
            font-style: italic;
            font-size: 13px;
            padding: 5px 20px;
            position: relative;
            z-index: 1;
        }
        
        .premium-card {
            background: rgba(214, 162, 74, 0.12);
            border: 1px solid rgba(214, 162, 74, 0.3);
            color: var(--ink);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin: 12px 20px;
        }
        
        .premium-card h3 { margin-bottom: 8px; color: var(--accent); }
        .premium-card p { font-size: 13px; color: var(--muted); }

        @media (max-width: 900px) {
            nav { padding: 0 20px; }
            .navbar-container { flex-direction: column; height: auto; padding: 16px 0; gap: 12px; }
            .navbar-links { flex-wrap: wrap; justify-content: center; }
            .nav-right { flex-wrap: wrap; justify-content: center; }
            .bubble { max-width: 86%; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="navbar-container">
            <a class="navbar-brand" href="/">AICHAT</a>
            <div class="navbar-links">
                <a href="/chat">Chat</a>
                <a href="/settings">Settings</a>
                <div class="nav-right">
                    <span id="counter" class="counter">Syncing</span>
                    <div class="user-profile">
                        <img id="profileImg" class="profile-img" alt="Profile">
                        <span id="profileName" class="profile-name"></span>
                    </div>
                    <button class="signout-btn" id="logoutBtn">Sign Out</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="chat-container" id="chatBox">
        <div class="message assistant">
            <div class="avatar">AI</div>
            <div class="bubble">Hello! I am your AI assistant. How can I help you today?</div>
        </div>
    </div>

    <div id="typingIndicator" class="typing" style="display:none;">AI is typing...</div>

    <div class="input-area">
        <div class="input-row">
            <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="handleKey(event)">
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script type="module">
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";

        const logoutBtn = document.getElementById('logoutBtn');
        const profileImg = document.getElementById('profileImg');
        const profileName = document.getElementById('profileName');
        const sendBtn = document.getElementById('sendBtn');

        window.sessionReady = false;

        const syncSession = async (user) => {
            const res = await fetch('/api/google-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify({
                    email: user.email,
                    name: user.displayName,
                    photoURL: user.photoURL
                })
            });

            if (!res.ok) {
                throw new Error('Session sync failed');
            }

            return res.json();
        };

        const loadFirebaseConfig = async () => {
            const res = await fetch('/api/firebase-config', { credentials: 'same-origin' });
            if (!res.ok) {
                throw new Error('Failed to load Firebase config');
            }
            return res.json();
        };

        const initFirebase = async () => {
            const firebaseConfig = await loadFirebaseConfig();
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);

            logoutBtn.addEventListener('click', () => {
                signOut(auth)
                    .then(() => {
                        fetch('/api/logout', { credentials: 'same-origin' })
                            .then(() => window.location.href = '/')
                            .catch(err => console.error('Logout error:', err));
                    })
                    .catch((error) => console.error('Logout error:', error));
            });

            onAuthStateChanged(auth, async (user) => {
                if (!user) {
                    window.location.href = '/';
                    return;
                }

                profileImg.src = user.photoURL || 'https://via.placeholder.com/36';
                profileName.textContent = user.displayName || 'User';

                try {
                    await syncSession(user);
                    window.sessionReady = true;
                    sendBtn.disabled = false;
                    await loadCount();
                } catch (error) {
                    window.location.href = '/';
                }
            });
        };

        sendBtn.disabled = true;

        initFirebase().catch((error) => {
            console.error('Firebase init failed:', error);
            window.location.href = '/';
        });
    </script>

    <script>
        async function loadCount() {
            const res = await fetch('/api/message-count', { credentials: 'same-origin' });
            if (res.status === 401) {
                window.location.href = '/';
                return;
            }
            const data = await res.json();
            const counter = document.getElementById('counter');
            counter.textContent = `${data.remaining} left`;
            counter.className = 'counter';
            if (data.remaining <= 10) counter.classList.add('danger');
            else if (data.remaining <= 30) counter.classList.add('warning');
        }

        function handleKey(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function appendMessage(role, text) {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <div class="avatar">${role === 'user' ? 'U' : 'AI'}</div>
                <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
            `;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        async function sendMessage() {
            if (!window.sessionReady) return;

            const input = document.getElementById('messageInput');
            const msg = input.value.trim();
            if (!msg) return;

            input.value = '';
            appendMessage('user', msg);
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('typingIndicator').style.display = 'block';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ message: msg })
                });

                if (res.status === 401) {
                    window.location.href = '/';
                    return;
                }

                const data = await res.json();
                document.getElementById('typingIndicator').style.display = 'none';

                if (res.status === 403) {
                    const box = document.getElementById('chatBox');
                    box.innerHTML += `
                        <div class="premium-card">
                            <h3>Daily limit reached</h3>
                            <p>${data.message}</p>
                            <p style="margin-top:10px;font-weight:bold;">Premium: ${data.premium_info.price}</p>
                            <p>${data.premium_info.features.join(' • ')}</p>
                        </div>`;
                    document.getElementById('sendBtn').disabled = true;
                } else {
                    appendMessage('assistant', data.reply);
                    loadCount();
                }
            } catch (e) {
                appendMessage('assistant', 'Sorry, something went wrong. Please try again.');
            }

            document.getElementById('sendBtn').disabled = false;
        }
    </script>
</body>
</html>
